<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — ShopCraft</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">🛍️ ShopCraft</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html" class="active">Products</a></li>
        <li><a href="cart.html">Cart <span class="cart-badge" id="cart-count">0</span></a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>All Products</h1>
      <p>Browse our full collection</p>
    </div>
  </div>

  <div class="products-page section">
    <div class="container">
      <!-- Filters & Search -->
      <div class="filters-bar">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="🔍 Search products..." oninput="applyFilters()" />
        </div>
        <div class="filter-controls">
          <select id="category-filter" onchange="applyFilters()">
            <option value="all">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="home">Home & Living</option>
            <option value="sports">Sports</option>
          </select>
          <select id="sort-filter" onchange="applyFilters()">
            <option value="default">Sort by: Default</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
      </div>

      <!-- Results count -->
      <p class="results-count" id="results-count"></p>

      <!-- Product Grid -->
      <div class="product-grid" id="products-container"></div>

      <!-- Empty state -->
      <div class="empty-state hidden" id="empty-state">
        <p>😕 No products found. Try adjusting your filters.</p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom">
      <p>© 2026 ShopCraft. All rights reserved.</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    // Read URL params for category pre-filter
    const params = new URLSearchParams(window.location.search);
    const catParam = params.get('category');
    if (catParam) {
      document.getElementById('category-filter').value = catParam;
    }

    applyFilters();
    updateCartBadge();

    function applyFilters() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const category = document.getElementById('category-filter').value;
      const sort = document.getElementById('sort-filter').value;

      let filtered = products.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(query) || p.description.toLowerCase().includes(query);
        const matchCategory = category === 'all' || p.category === category;
        return matchSearch && matchCategory;
      });

      if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
      else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
      else if (sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);

      const container = document.getElementById('products-container');
      const emptyState = document.getElementById('empty-state');
      const count = document.getElementById('results-count');

      if (filtered.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        count.textContent = '';
      } else {
        emptyState.classList.add('hidden');
        container.innerHTML = filtered.map(renderProductCard).join('');
        count.textContent = `Showing ${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;
      }
    }
  </script>
</body>
</html>
