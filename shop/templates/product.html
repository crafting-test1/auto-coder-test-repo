<div class="breadcrumb">
    <a href="/">Home</a> &rsaquo; <a href="/?category=$product_category">$product_category</a> &rsaquo; $product_name
</div>

<div class="product-detail">
    <div class="product-detail-image">$product_image</div>
    <div class="product-detail-info">
        <span class="product-category">$product_category</span>
        <h1>$product_name</h1>
        <div class="product-rating">$product_rating <span class="rating-num">($product_rating_num)</span></div>
        <p class="product-detail-description">$product_description</p>
        <div class="product-detail-price">$$product_price</div>
        <div class="product-actions">
            <div class="quantity-selector">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <input type="number" id="quantity" value="1" min="1" max="99" class="qty-input">
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <button class="btn btn-primary btn-lg" onclick="addToCart($product_id, getQty())">
                Add to Cart
            </button>
        </div>
    </div>
</div>

<section class="related-products" style="margin-top: 3rem;">
    <h2>Related Products</h2>
    <div class="product-grid">
        $related_cards
    </div>
</section>

<script>
function getQty() {
    return parseInt(document.getElementById('quantity').value) || 1;
}
function changeQty(delta) {
    const input = document.getElementById('quantity');
    let v = parseInt(input.value) + delta;
    if (v < 1) v = 1;
    if (v > 99) v = 99;
    input.value = v;
}
</script>
